name: Release

# We tag releases as plain semver (e.g. `v0.1.0`). The workflow also pushes a
# sibling tag `cli/v0.1.0` on the same commit so Go's nested-module
# resolution works for `go install github.com/jjfantini/humblSKILLS/cli/...`.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.2.0)"
        required: true

permissions:
  contents: write

jobs:
  tag-cli-module:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Resolve tag name
        id: resolve
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Push sibling cli/* tag for go install
        run: |
          set -eu
          ver="${{ steps.resolve.outputs.tag }}"
          sibling="cli/${ver}"
          if git rev-parse -q --verify "refs/tags/${sibling}" >/dev/null; then
            echo "sibling tag ${sibling} already exists — skipping"
            exit 0
          fi
          git tag "${sibling}" HEAD
          git push origin "${sibling}"

  goreleaser:
    needs: tag-cli-module
    runs-on: ubuntu-latest
    # The `release` environment gates the Homebrew tap PAT. Add
    # HOMEBREW_TAP_TOKEN as an environment secret in repo settings.
    environment: release
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.tag-cli-module.outputs.tag }}

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: cli/go.sum

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
